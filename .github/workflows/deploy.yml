name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"

            rm -f /usr/local/bin/node /usr/local/bin/npm /usr/local/bin/npx

            if ! command -v node >/dev/null 2>&1 || ! command -v npm >/dev/null 2>&1; then
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y nodejs npm
            fi

            command -v node >/dev/null 2>&1 || { echo "node not found on VPS"; exit 1; }
            command -v npm >/dev/null 2>&1 || { echo "npm not found on VPS"; exit 1; }

            cd /var/www/joshlayani.com
            git pull origin main
            npm ci --omit=dev
            install -d -m 0755 /etc/joshlayani.com
            cat <<EOF >/etc/joshlayani.com/api.env
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DATABASE_SSL=true
            PORT=3001
            CONTACT_TO_EMAIL=${{ secrets.CONTACT_TO_EMAIL }}
            RESUME_REQUEST_TO_EMAIL=${{ secrets.RESUME_REQUEST_TO_EMAIL }}
            CONTACT_FROM_EMAIL=${{ secrets.CONTACT_FROM_EMAIL }}
            ANALYTICS_DIGEST_TO_EMAIL=${{ secrets.ANALYTICS_DIGEST_TO_EMAIL }}
            ANALYTICS_TIMEZONE=America/Toronto
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_SECURE=${{ secrets.SMTP_SECURE }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            EOF
            chown root:www-data /etc/joshlayani.com/api.env
            chmod 640 /etc/joshlayani.com/api.env
            cp deploy/joshlayani-api.service /etc/systemd/system/joshlayani-api.service
            cp nginx/joshlayani.com /etc/nginx/sites-available/joshlayani.com
            systemctl daemon-reload
            systemctl enable joshlayani-api
            systemctl restart joshlayani-api
            sleep 2
            if ! systemctl is-active --quiet joshlayani-api; then
              systemctl --no-pager --full status joshlayani-api || true
              journalctl -u joshlayani-api -n 100 --no-pager || true
              exit 1
            fi
            if ! curl --fail http://127.0.0.1:3001/api/health; then
              systemctl --no-pager --full status joshlayani-api || true
              journalctl -u joshlayani-api -n 100 --no-pager || true
              exit 1
            fi
            nginx -t && systemctl reload nginx
